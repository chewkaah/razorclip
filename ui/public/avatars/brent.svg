<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background glow -->
  <circle cx="200" cy="200" r="195" fill="#0a1628"/>
  <circle cx="200" cy="200" r="195" fill="url(#brentGlow)" opacity="0.4"/>

  <!-- Body / Apron -->
  <path d="M120 280 Q120 240 140 230 L160 225 Q200 215 240 225 L260 230 Q280 240 280 280 L280 360 Q280 380 260 380 L140 380 Q120 380 120 360 Z" fill="#0f2654" stroke="#3B82F6" stroke-width="2"/>
  <!-- Apron detail -->
  <path d="M160 240 L160 340 Q160 350 170 350 L230 350 Q240 350 240 340 L240 240" fill="#163470" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Megaphone icon on apron -->
  <g transform="translate(185, 275)">
    <path d="M0 10 L10 5 L10 25 L0 20 Z" fill="#3B82F6"/>
    <path d="M10 5 L28 -2 L28 32 L10 25 Z" fill="#3B82F6" opacity="0.7"/>
    <rect x="-5" y="8" width="6" height="14" rx="2" fill="#3B82F6"/>
    <path d="M28 5 Q35 15 28 25" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M32 0 Q42 15 32 30" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Neck -->
  <rect x="180" y="195" width="40" height="35" rx="8" fill="#163470" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="175" y="215" width="50" height="8" rx="4" fill="#0f2654" stroke="#3B82F6" stroke-width="1"/>

  <!-- Head dome -->
  <ellipse cx="200" cy="140" rx="75" ry="80" fill="#0f2654" stroke="#3B82F6" stroke-width="2.5"/>
  <ellipse cx="200" cy="100" rx="55" ry="45" fill="url(#brentDome)" opacity="0.3"/>

  <!-- Eyes -->
  <ellipse cx="175" cy="140" rx="18" ry="20" fill="#0a1628" stroke="#3B82F6" stroke-width="2"/>
  <ellipse cx="225" cy="140" rx="18" ry="20" fill="#0a1628" stroke="#3B82F6" stroke-width="2"/>
  <circle cx="175" cy="138" r="8" fill="#3B82F6"/>
  <circle cx="225" cy="138" r="8" fill="#3B82F6"/>
  <circle cx="172" cy="135" r="3" fill="#93c5fd"/>
  <circle cx="222" cy="135" r="3" fill="#93c5fd"/>

  <!-- Confident smile -->
  <path d="M178 165 Q200 182 222 165" stroke="#3B82F6" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <circle cx="155" cy="158" r="8" fill="#3B82F6" opacity="0.2"/>
  <circle cx="245" cy="158" r="8" fill="#3B82F6" opacity="0.2"/>

  <!-- Antenna -->
  <line x1="200" y1="62" x2="200" y2="30" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <circle cx="200" cy="24" r="8" fill="#3B82F6"/>
  <circle cx="200" cy="24" r="4" fill="#93c5fd"/>

  <!-- Tie / Brand badge -->
  <path d="M200 225 L190 245 L200 320 L210 245 Z" fill="#3B82F6" opacity="0.5"/>
  <circle cx="200" cy="232" r="6" fill="#3B82F6" stroke="#93c5fd" stroke-width="1"/>

  <!-- Arms -->
  <path d="M120 250 Q90 260 80 285 Q78 300 90 310" stroke="#3B82F6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="90" cy="313" r="10" fill="#0f2654" stroke="#3B82F6" stroke-width="2"/>
  <!-- Right arm holding clipboard -->
  <path d="M280 250 Q310 255 320 275 Q322 285 315 295" stroke="#3B82F6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <rect x="305" y="288" width="24" height="32" rx="3" fill="#163470" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="310" y1="298" x2="324" y2="298" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>
  <line x1="310" y1="304" x2="320" y2="304" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>
  <line x1="310" y1="310" x2="322" y2="310" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>

  <defs>
    <radialGradient id="brentGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brentDome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>