services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      # Pin CLI auth dirs so claude_local / codex_local adapters find host tokens.
      # Container HOME is /paperclip (see Dockerfile), so the CLIs look here by default,
      # but we set the env vars explicitly to survive any future HOME changes.
      CLAUDE_CONFIG_DIR: /paperclip/.claude
      CODEX_HOME: /paperclip/.codex
    volumes:
      - paperclip-data:/paperclip
      # Bind-mount host CLI auth into the container so subscription logins
      # done in Terminal.app on the host are visible to in-container agents.
      # See 03-Infrastructure/Agent-Runtime.md for the full plan.
      - /Users/agent0/.claude:/paperclip/.claude
      - /Users/agent0/.codex:/paperclip/.codex
      # SSH key used by the in-container /usr/local/bin/hermes shim to reach
      # host hermes via agent0@host.docker.internal. See Obsidian note
      # 03-Infrastructure/Hermes-Install-Per-Machine.md.
      - /Users/agent0/.ssh/paperclip_hermes:/paperclip/.ssh/paperclip_hermes:ro
      # Host repos for codex_local agents (INT-57). Read-only — agents write via git worktrees.
      - /Users/agent0/Dev:/Users/agent0/Dev:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  paperclip-data:
